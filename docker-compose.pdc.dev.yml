version: "3.8"

services:
  pdc_strapi:
    container_name: pdc_strapi
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
        STRAPI_PUBLIC_URL: ${STRAPI_PUBLIC_URL}
    image: pdc-strapi-dev:latest
    restart: unless-stopped
    volumes:
      - ./apps/pdc-dashboard/src:/app/apps/pdc-dashboard/src
      - ./apps/pdc-dashboard/config:/app/apps/pdc-dashboard/config
      - ./apps/pdc-dashboard/public:/app/apps/pdc-dashboard/public
    environment:
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      APP_KEYS: ${APP_KEYS}
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: pdc_strapi_db
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      FLO_LEGAL_API_TOKEN: ${FLO_LEGAL_API_TOKEN}
      FLO_LEGAL_API_URL: ${FLO_LEGAL_API_URL}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL}
      HOST: ${HOST}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: development
      OPEN_FORMS_API_TOKEN: ${OPEN_FORMS_API_TOKEN}
      OPEN_FORMS_API_URL: ${OPEN_FORMS_API_URL}
      PORT: ${PORT}
      PREVIEW_SECRET_TOKEN: ${PREVIEW_SECRET_TOKEN}
      STRAPI_ENV_LABEL: ${STRAPI_ENV_LABEL}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
    ports:
      - "1337:1337"
    networks:
      - pdc_network
    depends_on:
      pdc_strapi_db:
        condition: service_healthy
    command: pnpm --filter @frameless/pdc-dashboard dev

  pdc_frontend:
    container_name: pdc_frontend
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
    image: pdc-frontend-dev:latest
    restart: unless-stopped
    volumes:
      - ./apps/pdc-frontend/src:/app/apps/pdc-frontend/src
      - ./apps/pdc-frontend/public:/app/apps/pdc-frontend/public
      - ./apps/pdc-frontend/.next:/app/apps/pdc-frontend/.next
    environment:
      CSP_CONNECT_SRC_URLS: ${CSP_CONNECT_SRC_URLS}
      CSP_FONT_SRC_URLS: ${CSP_FONT_SRC_URLS}
      CSP_FORM_ACTION_URLS: ${CSP_FORM_ACTION_URLS}
      CSP_FRAME_SRC_URLS: ${CSP_FRAME_SRC_URLS}
      CSP_IMG_SRC_URLS: ${CSP_IMG_SRC_URLS}
      CSP_SCRIPT_SRC_URLS: ${CSP_SCRIPT_SRC_URLS}
      CSP_STYLE_SRC_URLS: ${CSP_STYLE_SRC_URLS}
      CSP_WORKER_SRC_URLS: ${CSP_WORKER_SRC_URLS}
      FLO_LEGAL_API_TOKEN: ${FLO_LEGAL_API_TOKEN}
      FLO_LEGAL_API_URL: ${FLO_LEGAL_API_URL}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL}
      KCM_SURVEY_API_KEY: ${KCM_SURVEY_API_KEY}
      KCM_SURVEY_ID: ${KCM_SURVEY_ID}
      KCM_SURVEY_STYLESHEETS_LINK: ${KCM_SURVEY_STYLESHEETS_LINK}
      KCM_SURVEY_URL: ${KCM_SURVEY_URL}
      MATOMO_HOST: ${MATOMO_HOST}
      MATOMO_SITE_ID: ${MATOMO_SITE_ID}
      MATOMO_CONTAINER_ID: ${MATOMO_CONTAINER_ID}
      OGONE_PAYMENT_SERVICE_URL: ${OGONE_PAYMENT_SERVICE_URL}
      OPEN_FORMS_API_TOKEN: ${OPEN_FORMS_API_TOKEN}
      OPEN_FORMS_API_URL: ${OPEN_FORMS_API_URL}
      OPEN_FORMS_CSS_URL: ${OPEN_FORMS_CSS_URL}
      OPEN_FORMS_SDK_URL: ${OPEN_FORMS_SDK_URL}
      PANDOSEARCH_API_URL: ${PANDOSEARCH_API_URL}
      PREVIEW_SECRET_TOKEN: ${PREVIEW_SECRET_TOKEN}
      STRAPI_PRIVATE_URL: ${STRAPI_PRIVATE_URL}
      STRAPI_PUBLIC_URL: ${STRAPI_PUBLIC_URL}
    ports:
      - "3000:3000"
    networks:
      - pdc_network
    depends_on:
      pdc_strapi:
        condition: service_started
      pdc_strapi_db:
        condition: service_healthy
    command: pnpm --filter @frameless/pdc-frontend dev

  pdc_samenwerkende-catalogi:
    container_name: pdc_samenwerkende-catalogi
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
    image: pdc-sc-dev:latest
    restart: unless-stopped
    environment:
      STRAPI_PRIVATE_URL: ${STRAPI_PRIVATE_URL}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL}
    ports:
      - "4000:4000"
    networks:
      - pdc_network
    depends_on:
      pdc_strapi:
        condition: service_started
      pdc_strapi_db:
        condition: service_healthy
    command: pnpm --filter @frameless/samenwerkende-catalogi dev

  pdc_strapi_db:
    container_name: pdc_strapi_db
    platform: linux/amd64
    restart: unless-stopped
    image: postgres:12.0-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}'",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - pdc-strapi-data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - pdc_network

  pdc_pgadmin:
    container_name: pdc_pgadmin
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - pdc_network
    depends_on:
      - pdc_strapi_db

volumes:
  pdc-strapi-data:

networks:
  pdc_network:
    driver: bridge
